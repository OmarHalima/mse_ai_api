name: Test & Deploy to HuggingFace

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Run Tests ──────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          # Install Chromium deps manually (Ubuntu 24.04 compat)
          sudo apt-get install -y             libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2             libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2             libgbm1 libpango-1.0-0 libcairo2 libasound2t64 fonts-liberation
          # Install browser without --with-deps to skip broken apt step
          playwright install chromium

      - name: Check imports & syntax
        run: |
          python -c "import chatgpt_client; print('✅ chatgpt_client OK')"
          python -c "import stats; print('✅ stats OK')"
          python -c "import keepalive; print('✅ keepalive OK')"
          python -c "from main import app; print('✅ main/FastAPI app OK')"
          python -c "from playwright.async_api import async_playwright; print('✅ playwright OK')"

      - name: Verify no ddgs/duckduckgo_search dependency
        run: |
          python -c "
          import pkg_resources
          pkgs = [p.project_name for p in pkg_resources.working_set]
          assert 'ddgs' not in pkgs, '❌ ddgs should not be installed'
          assert 'duckduckgo-search' not in pkgs, '❌ duckduckgo-search should not be installed'
          print('✅ No DDG library — using Playwright + httpx')
          "

  # ── 2. Deploy to HuggingFace ──────────────────────────────────────────────────
  deploy:
    name: Deploy to HuggingFace Space
    runs-on: ubuntu-latest
    needs: test                         # only runs if tests pass
    if: github.ref == 'refs/heads/main' # only on push to main, not PRs

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true

      - name: Fix README short_description (HF max 60 chars)
        run: |
          python3 - <<'EOF'
          import re, pathlib
          readme = pathlib.Path("README.md")
          text   = readme.read_text()
          fixed  = re.sub(
              r"^short_description:.*$",
              "short_description: Free OpenAI API via DuckDuckGo AI Chat",
              text, flags=re.MULTILINE,
          )
          readme.write_text(fixed)
          m = re.search(r"^short_description:\s*(.+)$", fixed, re.MULTILINE)
          desc = m.group(1).strip() if m else ""
          assert len(desc) <= 60, f"short_description too long: {len(desc)} chars"
          print(f"✅ short_description OK ({len(desc)} chars): {desc}")
          EOF

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name  "GitHub Actions"

          # Commit README fix if it changed
          git add README.md
          git diff --cached --quiet || git commit -m "ci: fix README short_description for HF"

          # Add HuggingFace remote
          git remote add hf https://nopoh22:${HF_TOKEN}@huggingface.co/spaces/nopoh22/mse-ai-api

          # Force push to HF (triggers rebuild)
          git push hf main --force

      - name: Wait for Space to rebuild
        run: sleep 30

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://nopoh22-mse-ai-api.hf.space/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed (got $STATUS)"
            exit 1
          fi
          echo "✅ Space is live!"
