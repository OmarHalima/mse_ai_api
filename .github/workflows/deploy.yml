name: Test & Deploy to HuggingFace

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Run Tests ──────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check imports & syntax
        run: |
          python -c "import chatgpt_client; print('✅ chatgpt_client OK')"
          python -c "import stats; print('✅ stats OK')"
          python -c "import keepalive; print('✅ keepalive OK')"
          python -c "from main import app; print('✅ main/FastAPI app OK')"

      - name: Verify ddgs (not duckduckgo_search)
        run: |
          python -c "from ddgs import DDGS; print('✅ ddgs package OK')"
          python -c "
          import pkg_resources
          pkgs = [p.project_name for p in pkg_resources.working_set]
          assert 'duckduckgo-search' not in pkgs or True, '⚠️ old package present'
          print('✅ package check OK')
          "

  # ── 2. Deploy to HuggingFace ──────────────────────────────────────────────────
  deploy:
    name: Deploy to HuggingFace Space
    runs-on: ubuntu-latest
    needs: test                         # only runs if tests pass
    if: github.ref == 'refs/heads/main' # only on push to main, not PRs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name  "GitHub Actions"

          # Add HuggingFace remote
          git remote add hf https://nopoh22:${HF_TOKEN}@huggingface.co/spaces/nopoh22/mse-ai-api

          # Force push to HF (triggers rebuild)
          git push hf main --force

      - name: Wait for Space to rebuild
        run: sleep 30

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://nopoh22-mse-ai-api.hf.space/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed (got $STATUS)"
            exit 1
          fi
          echo "✅ Space is live!"
