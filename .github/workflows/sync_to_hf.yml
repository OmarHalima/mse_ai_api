name: Sync to HuggingFace Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Fix README for HuggingFace
        run: |
          printf '%s\n' '---' 'title: mse_ai_api' 'emoji: ⚡' 'colorFrom: purple' 'colorTo: blue' 'sdk: docker' 'pinned: true' 'short_description: Free OpenAI API via DuckDuckGo AI Chat' '---' '' '# mse_ai_api' '' 'Free OpenAI-compatible API via DuckDuckGo AI.' > README.md

      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git remote add hf https://nopoh22:$HF_TOKEN@huggingface.co/spaces/nopoh22/mse-ai-api || true
          git add README.md
          git commit -m "fix: HF-compatible README" --allow-empty
          git push hf main --force
